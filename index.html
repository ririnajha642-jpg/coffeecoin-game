<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffeecoin Tap</title>
    <style>
        body { 
            background-color: #1a0f00; 
            color: #fff; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
            user-select: none;
        }
        .header { margin-top: 20px; }
        .title { font-size: 28px; font-weight: bold; color: #d35400; text-transform: uppercase; }
        .score-container { font-size: 48px; font-weight: 800; margin-top: 20px; }
        .game-container { display: flex; justify-content: center; align-items: center; margin-top: 30px; position: relative; width: 100%; max-width: 400px; }
        .coin-btn { width: 220px; height: 220px; background: radial-gradient(circle, #e67e22, #d35400); border-radius: 50%; border: none; cursor: pointer; font-size: 80px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); outline: none; transition: transform 0.05s ease; }
        .coin-btn:active { transform: scale(0.92); }
        .floating-text { position: absolute; font-size: 32px; font-weight: bold; color: #f39c12; pointer-events: none; animation: flyUp 0.6s ease-out forwards; z-index: 10; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Coffeecoin Tap</div>
        <div class="score-container">☕ <span id="score">0</span></div>
    </div>
    <div class="game-container" id="gameArea">
        <button class="coin-btn" id="tapBtn">☕</button>
    </div>
    <script>
        let count = 0;
        const scoreEl = document.getElementById('score');
        const tapBtn = document.getElementById('tapBtn');
        const gameArea = document.getElementById('gameArea');

        tapBtn.addEventListener('click', (e) => {
            count++;
            scoreEl.innerText = count.toLocaleString();

            const rect = tapBtn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const num = document.createElement('div');
            num.classList.add('floating-text');
            num.innerText = '+1';
            num.style.left = x + 'px';
            num.style.top = y + 'px';

            gameArea.appendChild(num);
            setTimeout(() => num.remove(), 600);
        });
    </script>
</body>
</html>
