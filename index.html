<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffeecoin Tap</title>
    <!-- Script resmi Telegram WebApp API -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a0f00; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            user-select: none;
        }

        .page {
            padding: 20px;
            padding-bottom: 100px; 
        }

        .title {
            color: #e67e22;
            font-size: 28px;
            font-weight: bold;
            margin-top: 40px;
            letter-spacing: 2px;
        }

        .score-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
        }

        .score-text {
            font-size: 45px;
            font-weight: bold;
        }

        .tap-area {
            margin-top: 50px;
            display: flex;
            justify-content: center;
        }

        .circle-btn {
            width: 250px;
            height: 250px;
            background-color: #d35400;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(211, 84, 0, 0.5);
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        .circle-btn:active {
            transform: scale(0.95);
        }

        .coffee-display {
            font-size: 80px;
        }

        .task-list {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background-color: #2c1a04;
            border: 1px solid #4a2d0b;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 10px;
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-info h4 {
            margin: 0 0 5px 0;
            font-size: 16px;
        }

        .task-info p {
            margin: 0;
            color: #f39c12;
            font-size: 14px;
            font-weight: bold;
        }

        .task-action {
            display: flex;
            gap: 8px;
        }

        .btn-task {
            background-color: #e67e22;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-claim {
            background-color: #27ae60;
        }

        .btn-task:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }

        .input-verify {
            width: 90%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #4a2d0b;
            background-color: #110a00;
            color: white;
            font-size: 14px;
            margin-top: 5px;
        }

        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: #110a00;
            border-top: 2px solid #331e03;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            color: #888888;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 50%;
            height: 100%;
            justify-content: center;
        }

        .nav-item.active {
            color: #e67e22;
        }

        .nav-icon {
            font-size: 22px;
        }
    </style>
</head>
<body>

    <!-- 1. HALAMAN UTAMA (TAP GAME) -->
    <div id="page-tap" class="page">
        <div class="title">COFFEECOIN TAP</div>
        <div class="score-container">
            <span class="score-icon">☕</span>
            <span id="score-text" class="score-text">0</span>
        </div>
        <div class="tap-area">
            <div class="circle-btn" onclick="tambahKoin()">
                <span class="coffee-display">☕</span>
            </div>
        </div>
    </div>

    <!-- 2. HALAMAN MISI (TASKS) -->
    <div id="page-tasks" class="page" style="display: none;">
        <div class="title">TASKS</div>
        <p style="color: #bdc3c7; margin-bottom: 20px;">Selesaikan misi untuk mendapatkan bonus koin!</p>

        <div class="task-list">
            
            <!-- MISI 1: JOIN TELEGRAM -->
            <div class="task-item">
                <div class="task-row">
                    <div class="task-info">
                        <h4>Join Telegram Channel</h4>
                        <p>+1,000 COFFEE</p>
                    </div>
                    <div class="task-action">
                        <button id="btn-join-1" class="btn-task" onclick="bukaChannelTelegram()">Join</button>
                        <button id="btn-claim-1" class="btn-task btn-claim" onclick="validasiJoinChannel()" style="display: none;">Claim</button>
                    </div>
                </div>
            </div>

            <!-- MISI 2: DOWNLOAD SIKKAFUN -->
            <div class="task-item">
                <div class="task-row">
                    <div class="task-info">
                        <h4>Download SikkaFun App</h4>
                        <p>+5,000 COFFEE</p>
                    </div>
                    <div class="task-action">
                        <button id="btn-download-2" class="btn-task" onclick="bukaLinkDownload('https://join.sikka.fun/bzvmoua')">Download</button>
                    </div>
                </div>
                <div id="verify-area-2" style="display: none;">
                    <p style="margin: 5px 0; font-size: 12px; color: #bdc3c7;">Masukkan kode rahasia dari aplikasi SikkaFun:</p>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="input-code-2" class="input-verify" placeholder="Contoh: SIKKA99">
                        <button class="btn-task btn-claim" onclick="validasiKodeAPK()">Verify</button>
                    </div>
                </div>
                <button id="btn-done-2" class="btn-task" style="display: none; background-color: #7f8c8d;" disabled>Claimed ✓</button>
            </div>

        </div>
    </div>

    <!-- 3. MENU NAVIGASI BAWAH -->
    <nav class="navbar">
        <button id="nav-tap" class="nav-item active" onclick="pindahTab('tap')">
            <span class="nav-icon">☕</span>
            <span>Tap</span>
        </button>
        <button id="nav-tasks" class="nav-item" onclick="pindahTab('tasks')">
            <span class="nav-icon">📋</span>
            <span>Tasks</span>
        </button>
    </nav>

    <script>
        // === INTEGRASI DATA AKUN COFFEECOIN ===
        const BOT_TOKEN = "8342562835:AAH5YH514j_0InacnC_oZYsW3LU2mKX3Kpw"; 
        const CHANNEL_ID = "@coffeecoin0fficial"; 
        const KODE_RAHASIA_APK = "COFFEEKAN123"; // Kode rahasia pembuktian download

        let totalKoin = parseInt(localStorage.getItem('coffeecoin_score')) || 0;
        let userIdTelegram = null;

        document.getElementById('score-text').innerText = totalKoin.toLocaleString();

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            if (window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
                userIdTelegram = window.Telegram.WebApp.initDataUnsafe.user.id;
            }
        }

        function tambahKoin() {
            totalKoin += 1;
            document.getElementById('score-text').innerText = totalKoin.toLocaleString();
            localStorage.setItem('coffeecoin_score', totalKoin);
        }

        function pindahTab(target) {
            document.getElementById('page-tap').style.display = target === 'tap' ? 'block' : 'none';
            document.getElementById('page-tasks').style.display = target === 'tasks' ? 'block' : 'none';
            document.getElementById('nav-tap').classList.toggle('active', target === 'tap');
            document.getElementById('nav-tasks').classList.toggle('active', target === 'tasks');
            
            if (target === 'tasks') {
                periksaStatusSemuaTombol();
            }
        }

        function bukaChannelTelegram() {
            const linkChannel = "https://t.me" + CHANNEL_ID.replace('@', '');
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openTelegramLink(linkChannel);
            } else {
                window.open(linkChannel, '_blank');
            }
            localStorage.setItem('task_1_status', 'opened');
            setTimeout(() => { periksaStatusSemuaTombol(); }, 1500);
        }

        function validasiJoinChannel() {
            if (!userIdTelegram) {
                alert("ID Telegram tidak terdeteksi. Jalankan lewat aplikasi Telegram HP!");
                return;
            }

            const url = `https://telegram.org{BOT_TOKEN}/getChatMember?chat_id=${CHANNEL_ID}&user_id=${userIdTelegram}`;
            
            fetch(url)
            .then(res => res.json())
