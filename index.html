<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffeecoin Tap</title>
    <!-- Script resmi Telegram Web App -->
    <script src="https://telegram.org"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #1a0d00; /* Warna cokelat tua sesuai game kamu */
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Utama */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 80px; /* Jarak agar tidak tertutup navbar */
        }

        .page {
            display: none;
            width: 100%;
            text-align: center;
        }

        .active-page {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #d27d2d;
            font-size: 24px;
            letter-spacing: 1px;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        /* --- HALAMAN TAP --- */
        .score-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .score-icon {
            width: 50px;
            height: auto;
        }

        .score-text {
            font-size: 48px;
            font-weight: bold;
        }

        .tap-button {
            width: 280px;
            height: 280px;
            background-color: #e67e22; /* Bulatan orange kamu */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.1s ease;
            border: none;
            outline: none;
        }

        .tap-button:active {
            transform: scale(0.95);
        }

        .coffee-img {
            width: 140px;
            height: auto;
        }

        /* --- HALAMAN TASKS --- */
        .task-list {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }

        .task-item {
            background-color: #2c1a0c;
            border: 1px solid #4a2f17;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .task-info p {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .task-info span {
            font-size: 13px;
            color: #f39c12;
        }

        .task-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .task-btn:disabled {
            background-color: #555;
            color: #aaa;
            cursor: not-allowed;
        }

        /* --- NAVBAR BAWAH --- */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: #110800;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 2px solid #2c1a0c;
        }

        .nav-item {
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            width: 25%;
        }

        .nav-item.active {
            color: #e67e22;
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- HALAMAN UTAMA (TAP COFFEE) -->
        <div id="page-tap" class="page active-page">
            <h1>COFFEECOIN TAP</h1>
            
            <div class="score-container">
                <!-- Icon Kopi Kecil di Samping Angka -->
                <img src="https://flaticon.com" class="score-icon" alt="coffee">
                <div id="score" class="score-text">0</div>
            </div>

            <!-- Tombol Tap Bulat Besar -->
            <button class="tap-button" onclick="handleTap()">
                <!-- Gambar Kopi di dalam Bulatan -->
                <img src="https://flaticon.com" class="coffee-img" alt="coffee-click">
            </button>
        </div>

        <!-- HALAMAN TUGAS (TASKS) -->
        <div id="page-tasks" class="page">
            <h1>DAFTAR MISI</h1>
            
            <div class="task-list">
                <!-- Tugas 1: Join Telegram -->
                <div class="task-item">
                    <div class="task-info">
                        <p>Join Official Channel</p>
                        <span>+1,000 Coffeecoin</span>
                    </div>
                    <button id="btn-task1" class="task-btn" onclick="jalankanMisi('task1', 'https://t.me')">Mulai</button>
                </div>

                <!-- Tugas 2: Follow X/Twitter -->
                <div class="task-item">
                    <div class="task-info">
                        <p>Follow Akun X (Twitter)</p>
                        <span>+500 Coffeecoin</span>
                    </div>
                    <button id="btn-task2" class="task-btn" onclick="jalankanMisi('task2', 'https://x.com')">Mulai</button>
                </div>
            </div>
        </div>

    </div>

    <!-- MENU NAVIGASI BAWAH -->
    <div class="navbar">
        <button id="nav-tap" class="nav-item active" onclick="pindahHalaman('tap')">
            <span class="nav-icon">☕</span>
            <span>Tap</span>
        </button>
        <button id="nav-tasks" class="nav-item" onclick="pindahHalaman('tasks')">
            <span class="nav-icon">📋</span>
            <span>Tasks</span>
        </button>
    </div>

    <script>
        // Beritahu Telegram kalau Web App siap digunakan
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // Layar penuh otomatis
        }

        // Ambil data saldo lama dari memori HP biar tidak reset ke 0 saat ditutup
        let saldo = parseInt(localStorage.getItem('coffeecoin_saldo')) || 0;
        document.getElementById('score').innerText = saldo;

        // Logika Klik Kopi (Fitur Utama Kamu Sebelumnya)
        function handleTap() {
            saldo += 1;
            document.getElementById('score').innerText = saldo;
            localStorage.setItem('coffeecoin_saldo', saldo);
            
            // Efek getar HP saat di-tap (fitur khas Telegram Bot)
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        }

        // Logika Perpindahan Menu Tab
        function pindahHalaman(target) {
            // Hapus kelas aktif di halaman & navbar sebelumnya
            document.getElementById('page-tap').classList.remove('active-page');
            document.getElementById('page-tasks').classList.remove('active-page');
            document.getElementById('nav-tap').classList.remove('active');
            document.getElementById('nav-tasks').classList.remove('active');

            // Aktifkan halaman & tombol navigasi pilihan user
            if (target === 'tap') {
                document.getElementById('page-tap').classList.add('active-page');
                document.getElementById('nav-tap').classList.add('active');
            } else if (target === 'tasks') {
                document.getElementById('page-tasks').classList.add('active-page');
                document.getElementById('nav-tasks').classList.add('active');
                periksaStatusMisi(); // Update tampilan tombol saat halaman misi dibuka
            }
        }

        // Logika Eksekusi Misi
        function jalankanMisi(idMisi, url) {
            const tombol = document.getElementById('btn-' + idMisi);
            
            if (tombol.innerText === 'Mulai') {
                // Tahap 1: Buka link tugas lewat Telegram
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.openTelegramLink(url);
                } else {
                    window.open(url, '_blank');
                }
                
                // Ubah teks tombol jadi "Klaim" setelah diklik
                tombol.innerText = 'Klaim';
                tombol.style.backgroundColor = '#f39c12';
                localStorage.setItem(idMisi + '_status', 'klaim');
            } 
            else if (tombol.innerText === 'Klaim') {
                // Tahap 2: Tambahkan koin ke saldo user
                let hadiah = idMisi === 'task1' ? 1000 : 500;
                saldo += hadiah;
                document.getElementById('score').innerText = saldo;
                localStorage.setItem('coffeecoin_saldo', saldo);
