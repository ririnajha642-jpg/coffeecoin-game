<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffeecoin Tap</title>
    <script src="https://telegram.org"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #1a0d00;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 90px;
        }

        .page {
            display: none;
            width: 100%;
            text-align: center;
        }

        .active-page {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #d27d2d;
            font-size: 24px;
            letter-spacing: 1px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        /* --- HALAMAN TAP --- */
        .score-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .score-icon-small {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .score-text {
            font-size: 48px;
            font-weight: bold;
        }

        .tap-button {
            width: 280px;
            height: 280px;
            background-color: #e67e22;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.1s ease;
            border: none;
            outline: none;
            position: relative;
        }

        .tap-button:active {
            transform: scale(0.95);
        }

        /* KUNCI UTAMA: pointer-events: none membuat klik menembus gambar langsung ke tombol */
        .coffee-image-big {
            width: 190px;
            height: 190px;
            object-fit: contain;
            pointer-events: none; 
        }

        /* --- HALAMAN TASKS MANUAL --- */
        .task-list {
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
        }

        .task-item {
            background-color: #2c1a0c;
            border: 1px solid #4a2f17;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-info p {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .task-info span {
            font-size: 13px;
            color: #f39c12;
        }

        .task-action-row {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
        }

        .task-input {
            flex: 1;
            background-color: #110800;
            border: 1px solid #4a2f17;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .task-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
        }

        .task-btn:disabled {
            background-color: #555 !important;
            color: #aaa;
            cursor: not-allowed;
        }

        /* --- NAVBAR BAWAH --- */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: #110800;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 2px solid #2c1a0c;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            width: 25%;
        }

        .nav-item.active {
            color: #e67e22;
        }

        .nav-icon-menu {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- HALAMAN UTAMA (TAP COFFEE) -->
        <div id="page-tap" class="page active-page">
            <h1>COFFEECOIN TAP</h1>
            
            <div class="score-container">
                <!-- Gambar Koin Kecil Bawaan Project Kamu -->
                <img src="coffee.png" class="score-icon-small" alt="coffee">
                <div id="score" class="score-text">0</div>
            </div>

            <!-- Tombol Utama yang Bisa Diktep -->
            <button class="tap-button" onclick="handleTap()">
                <!-- Gambar Koin Besar Bawaan Project Kamu -->
                <img src="coffee-click.png" class="coffee-image-big" alt="coffee-click">
            </button>
        </div>

        <!-- HALAMAN TUGAS (TASKS MANUAL) -->
        <div id="page-tasks" class="page">
            <h1>DAFTAR MISI</h1>
            
            <div class="task-list">
                
                <!-- MISI 1 -->
                <div class="task-item">
                    <div class="task-header">
                        <div class="task-info">
                            <p>1. Join Channel Telegram</p>
                            <span>+1,000 Coffeecoin</span>
                        </div>
                        <button class="task-btn" onclick="bukaLink('https://t.me')">Buka Link</button>
                    </div>
                    <div class="task-action-row">
                        <input type="text" id="input-task1" class="task-input" placeholder="Masukkan Username Telegram kamu...">
                        <button id="btn-task1" class="task-btn" style="background-color: #27ae60;" onclick="kirimBuktiManual('task1', 'Join Channel Telegram')">Kirim</button>
                    </div>
                </div>

                <!-- MISI 2 -->
                <div class="task-item">
                    <div class="task-header">
                        <div class="task-info">
                            <p>2. Follow Akun X / Twitter</p>
                            <span>+500 Coffeecoin</span>
                        </div>
                        <button class="task-btn" onclick="bukaLink('https://x.com')">Buka Link</button>
                    </div>
                    <div class="task-action-row">
                        <input type="text" id="input-task2" class="task-input" placeholder="Masukkan Username X kamu...">
                        <button id="btn-task2" class="task-btn" style="background-color: #27ae60;" onclick="kirimBuktiManual('task2', 'Follow Akun X / Twitter')">Kirim</button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- MENU NAVIGASI BAWAH -->
    <div class="navbar">
        <button id="nav-tap" class="nav-item active" onclick="pindahHalaman('tap')">
            <img src="coffee.png" class="nav-icon-menu" alt="Tap">
            <span>Tap</span>
        </button>
        <button id="nav-tasks" class="nav-item" onclick="pindahHalaman('tasks')">
            <!-- Icon Checklist untuk Menu Tasks -->
            <span style="font-size: 20px;">📋</span>
            <span>Tasks</span>
        </button>
    </div>

            const user = window.Telegram.WebApp.initDataUnsafe.user;
            telegramUser = user.username ? "@" + user.username : user.first_name;
            telegramUserId = user.id;
        }

        let saldo = parseInt(localStorage.getItem('coffeecoin_saldo')) || 0;
        document.getElementById('score').innerText = saldo;

        function handleTap() {
            saldo += 1;
            document.getElementById('score').innerText = saldo;
            localStorage.setItem('coffeecoin_saldo', saldo);
            
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        }
